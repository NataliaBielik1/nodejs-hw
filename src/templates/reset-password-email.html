<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Your Password</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
        }
        .button {
            display: inline-block;
            padding: 12px 24px;
            margin: 20px 0;
            background-color: #3498db;
            color: #ffffff;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
        .footer {
            margin-top: 20px;
            font-size: 0.8em;
            color: #7f8c8d;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Вітаємо, {{name}}!</h1>
        <p>Ви отримали цей лист, оскільки ми отримали запит на скидання пароля для вашого облікового запису.</p>
        <p>Для того, щоб скинути пароль, натисніть на кнопку нижче:</p>
        <a href="{{{link}}}" class="button" style="color: #ffffff;">Скинути пароль</a>
        <p>Якщо ви не робили цього запиту, просто ігноруйте цей лист.</p>
        <div class="footer">
            <p>Цей лінк дійсний протягом 15 хвилин.</p>
        </div>
    </div>
</body>
</html>
